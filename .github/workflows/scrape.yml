name: Scrape supermarkt prijzen

on:
  schedule:
    # 05:30 UTC — bewust NA checkjebon (~04:57 UTC) zodat we hun verse data pakken
    - cron: '30 5 * * *'
  workflow_dispatch:        # handmatig kunnen triggeren

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installeer npm dependencies (Playwright)
        run: npm ci

      - name: Installeer Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape AH (mobile API, met bonus-data)
        run: node scripts/scrape-ah.mjs

      - name: Scrape Jumbo + Plus + Lidl (via checkjebon)
        run: node scripts/scrape-checkjebon.mjs jumbo plus lidl

      - name: Scrape Lidl weekaanbiedingen (Playwright, met bonus-data)
        run: node scripts/scrape-lidl-bonus.mjs

      - name: Scrape Jumbo weekaanbiedingen (Playwright, met bonus-data)
        run: node scripts/scrape-jumbo-bonus.mjs

      - name: Scrape Plus weekaanbiedingen (Playwright, met bonus-data)
        run: node scripts/scrape-plus-bonus.mjs

      - name: Prijsgeschiedenis bijwerken
        run: node scripts/update-price-history.mjs

      - name: Commit data if changed
        run: |
          git config user.name  "boodschappen-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Geen wijzigingen — niets te committen."
          else
            git commit -m "data: dagelijkse prijs-update [skip ci]"
            git pull --rebase
            git push
          fi
