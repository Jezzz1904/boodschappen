name: Scrape supermarkt prijzen

on:
  schedule:
    - cron: '15 4 * * *'   # elke dag 05:15 NL-tijd (04:15 UTC zomertijd / 05:15 wintertijd)
  workflow_dispatch:        # handmatig kunnen triggeren

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scrapers
        run: node scraper/run.mjs

      - name: Commit data if changed
        run: |
          git config user.name  "boodschappen-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Geen wijzigingen — niets te committen."
          else
            git commit -m "data: dagelijkse prijs-update [skip ci]"
            git push
          fi
